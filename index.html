<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汉字听写</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="app">

        <header class="navbar">
            <span class="nav-back" id="navBack" style="display:none;">‹</span>
            <span class="nav-title" id="navTitle">统计</span>
        </header>

        <main class="main-content" id="mainContent">

            <!-- ============ 统计页 ============ -->
            <section id="page-statistics" class="page-section active">
                <div class="statistics-page">
                    <div class="stats-hero">
                        <div class="stats-hero-icon">📖</div>
                        <div class="stats-hero-title">汉字听写助手</div>
                        <div class="stats-hero-sub">每天进步一点点</div>
                    </div>
                    <div class="stats-btn" id="goLatestBtn">
                        <span class="stats-btn-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                                <polyline points="12,6 12,12 16,14" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" />
                            </svg>
                        </span>
                        <span class="stats-btn-text">最新听写</span>
                    </div>
                    <div class="stats-btn" id="goHistoryBtn">
                        <span class="stats-btn-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor"
                                    stroke-width="2" />
                                <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2" />
                                <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" />
                                <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" />
                            </svg>
                        </span>
                        <span class="stats-btn-text">历史听写</span>
                    </div>
                    <div class="stats-btn" id="goErrorBtn">
                        <span class="stats-btn-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                                    stroke="currentColor" stroke-width="2" />
                                <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2" />
                                <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" />
                                <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" />
                            </svg>
                        </span>
                        <span class="stats-btn-text">错词本</span>
                    </div>
                </div>
            </section>

            <!-- ============ 知识库页 ============ -->
            <section id="page-characters" class="page-section">
                <div class="grade-tabs" id="charGradeTabs"></div>
                <div class="knowledge-page" id="knowledgePage">
                    <div class="category-grid" id="categoryGrid"></div>
                </div>
            </section>

            <!-- ============ 听写页 ============ -->
            <section id="page-dictation" class="page-section">

                <div id="dict-select" class="dict-subpage active">
                    <div class="grade-tabs" id="dictCategoryTabs"></div>
                    <div class="mode-tabs" id="dictModeTabs"></div>
                    <div class="grade-tabs" id="dictGradeTabs"></div>
                    <div class="filter-bar">
                        <div class="filter-picker">
                            <select id="dictUnitFilter">
                                <option value="0">选择单元</option>
                            </select>
                        </div>
                        <div class="filter-picker" id="dictLessonPicker">
                            <select id="dictLessonFilter">
                                <option value="0">选择课文</option>
                            </select>
                        </div>
                    </div>
                    <div class="select-preview">
                        <span class="preview-text">共 <span class="preview-count" id="dictCount">0</span> 个字词，准备听写</span>
                    </div>
                    <div class="dict-char-preview" id="dictCharPreview"></div>
                    <div class="start-btn-wrap">
                        <div class="start-btn" id="dictStartBtn">开始听写</div>
                    </div>
                </div>

                <div id="dict-running" class="dict-subpage">
                    <div class="progress-area">
                        <span class="progress-text" id="dictProgressText">1 / 1</span>
                        <div class="progress-bar">
                            <div class="progress-fill" id="dictProgressFill" style="width:0%"></div>
                        </div>
                    </div>
                    <div class="char-display">
                        <span class="pinyin" id="dictPinyin"></span>
                        <span class="main-char" id="dictMainChar"></span>
                        <span class="category-badge" id="dictBadge" style="display:none;"></span>
                    </div>
                    <div class="read-indicator" id="dictReadIndicator"></div>
                    <div class="pause-hint" id="dictPauseHint" style="display:none;">
                        <span class="pause-hint-text">已暂停</span>
                    </div>
                    <div class="control-btns">
                        <button class="ctrl-btn ctrl-btn-pause" id="dictPauseBtn">⏸ 暂停</button>
                        <button class="ctrl-btn ctrl-btn-stop" id="dictStopBtn">⏹ 停止</button>
                    </div>
                </div>

                <div id="dict-complete" class="dict-subpage">
                    <div class="complete-icon">✓</div>
                    <div class="complete-title">听写完成！</div>
                    <div class="complete-stat" id="dictCompleteStat"></div>
                    <div class="complete-grid" id="dictCompleteGrid"></div>
                    <div class="complete-btns">
                        <div class="complete-btn complete-btn-primary" id="dictRestartBtn">再来一次</div>
                        <div class="complete-btn complete-btn-secondary" id="dictBackBtn">返回选择</div>
                    </div>
                </div>

            </section>

            <!-- ============ 我的页 ============ -->
            <section id="page-mine" class="page-section">
                <div class="mine-page">
                    <div class="section">
                        <span class="section-title">账户</span>
                        <div class="account-info" id="accountInfo">未登录</div>
                        <div style="margin-top:14px;">
                            <button class="btn btn-outline btn-block" id="logoutBtn">退出登录</button>
                        </div>
                    </div>
                    <div class="section">
                        <span class="section-title">数据同步</span>
                        <div class="sync-status" id="syncStatus" style="display:none;">
                            <span class="sync-status-text" id="syncStatusText"></span>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-primary" id="pushBtn">推送数据</button>
                            <button class="btn btn-outline" id="pullBtn">更新数据</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ============ 历史听写页（子页） ============ -->
            <section id="page-history" class="page-section">
                <div class="month-bar">
                    <div class="month-arrow" id="prevMonthBtn">◂</div>
                    <span class="month-text" id="historyMonthLabel"></span>
                    <div class="month-arrow" id="nextMonthBtn">▸</div>
                </div>
                <div class="content-area">
                    <div class="date-list" id="dateListContainer"></div>
                    <div class="char-area" id="charAreaContainer"></div>
                </div>
            </section>

            <!-- ============ 最新听写页（子页） ============ -->
            <section id="page-latest" class="page-section">
                <div class="date-header" id="latestDateHeader"></div>
                <div class="latest-char-scroll" id="latestCharArea"></div>
            </section>

            <!-- ============ 错词本页（子页） ============ -->
            <section id="page-error" class="page-section">
                <div class="month-bar">
                    <div class="month-arrow" id="errorPrevMonthBtn">◂</div>
                    <span class="month-text" id="errorMonthLabel"></span>
                    <div class="month-arrow" id="errorNextMonthBtn">▸</div>
                </div>
                <div class="error-info-bar">
                    <span class="error-count-text" id="errorCountText"></span>
                </div>
                <div class="error-char-scroll" id="errorCharArea"></div>
            </section>

            <!-- ============ 知识库分类详情页（子页） ============ -->
            <section id="page-category" class="page-section">
                <div class="grade-tabs" id="cateGradeTabs"></div>
                <div class="filter-bar">
                    <div class="filter-picker">
                        <select id="cateUnitFilter">
                            <option value="0">全部单元</option>
                        </select>
                    </div>
                    <div class="filter-picker">
                        <select id="cateLessonFilter">
                            <option value="0">全部课文</option>
                        </select>
                    </div>
                </div>
                <div class="char-list-area" id="cateListArea"></div>
                <button class="fab fab-manage" id="cateManageBtn">⚙</button>
                <button class="fab" id="cateAddBtn">+</button>
            </section>

        </main>

        <nav class="tabbar" id="tabbar">
            <div class="tab-item active" data-tab="statistics">
                <span class="tab-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="12" width="4" height="9" rx="1" stroke="currentColor" stroke-width="2" />
                        <rect x="10" y="7" width="4" height="14" rx="1" stroke="currentColor" stroke-width="2" />
                        <rect x="17" y="3" width="4" height="18" rx="1" stroke="currentColor" stroke-width="2" />
                    </svg>
                </span><span class="tab-text">统计</span>
            </div>
            <div class="tab-item" data-tab="characters">
                <span class="tab-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor"
                            stroke-width="2" />
                    </svg>
                </span><span class="tab-text">知识库</span>
            </div>
            <div class="tab-item" data-tab="dictation">
                <span class="tab-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" />
                    </svg>
                </span><span class="tab-text">听写</span>
            </div>
            <div class="tab-item" data-tab="mine">
                <span class="tab-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </span><span class="tab-text">我的</span>
            </div>
        </nav>

    </div>

    <div id="toast" class="toast"></div>

    <div id="modalMask" class="modal-mask" style="display:none;">
        <div class="modal-box" id="modalBox"></div>
    </div>

    <div id="loadingMask" class="loading-mask" style="display:none;">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">加载中...</div>
    </div>

    <script src="js/gitee.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tts.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
